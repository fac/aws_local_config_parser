name: Build and Release Gem
on:
  push:
    branches:
      - main
    paths:
      - lib/aws_local_config_parser/version.rb

jobs:
  release:
    name: Release to RubyGems.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
    # Build the gem package
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
      with:
        bundler-cache: true

    # Run tests and rubocop
    - name: Run tests and rubocop
      run: bundle exec rake

    # Release
    - name: Release to RubyGems.org
      uses: rubygems/release-gem@f0d7faff26625599a847d40d9fa28ace24c2aacc # v1
